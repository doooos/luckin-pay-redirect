<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>跳转微信支付</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
}
.card {
  background: white;
  border-radius: 20px;
  padding: 36px 28px;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  max-width: 340px;
  width: 90%;
}
.emoji-icon { font-size: 64px; margin-bottom: 12px; }
h2 { color: #1a1a1a; font-size: 22px; }
.price { font-size: 36px; font-weight: 700; color: #07c160; margin: 12px 0 4px; }
.desc { color: #888; font-size: 14px; margin-bottom: 20px; }
.qr-container {
  background: #f9f9f9;
  border-radius: 16px;
  padding: 20px;
  margin: 16px 0;
}
.qr-container canvas, .qr-container img {
  width: 200px;
  height: 200px;
  display: block;
  margin: 0 auto;
}
.qr-hint { font-size: 12px; color: #999; margin-top: 8px; }
.btn {
  display: block; width: 100%;
  border-radius: 50px; padding: 16px 0;
  font-size: 18px; font-weight: 600;
  cursor: pointer; text-decoration: none;
  margin: 8px 0; transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.btn-wechat { background: #07c160; color: white; }
.btn-wechat:active { background: #06ad56; }
.hint { font-size: 12px; color: #aaa; margin-top: 16px; line-height: 1.5; }
</style>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.js"></script>
</head>
<body>
<div class="card">
  <div class="emoji-icon">☕</div>
  <h2>瑞幸咖啡 - 在线支付</h2>
  <div class="price">¥9.9</div>
  <div class="desc" id="prodName">生椰拿铁(首创) · 冰 · 不另外加糖</div>

  <!-- 微信支付按钮 -->
  <a id="btnWechat" class="btn btn-wechat" href="weixin://wxpay/bizpayurl?pr=yAoepgSz3">
    💳 微信支付
  </a>

  <div class="hint">點擊上方按鈕 -> 打開微信</div>

  <!-- QR Code -->
  <div class="qr-container">
    <div id="qrcode"></div>
    <div class="qr-hint">📱 截圖此頁 → 微信掃一掃支付</div>
  </div>
</div>

<script>
var PAY_URL = "weixin://wxpay/bizpayurl?pr=yAoepgSz3";

// Generate QR code
new QRCode(document.getElementById("qrcode"), {
  text: PAY_URL,
  width: 200,
  height: 200
});

// Auto-redirect
setTimeout(function() {
  try { window.location.href = PAY_URL; } catch(e) {}
}, 500);
</script>
</body>
</html>
