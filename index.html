<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luckin Pay Redirect</title>
<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
  background: #f5f5f5;
}
.card {
  background: white;
  border-radius: 16px;
  padding: 40px;
  text-align: center;
  box-shadow: 0 4px 24px rgba(0,0,0,0.1);
  max-width: 320px;
}
h2 { color: #333; margin-bottom: 8px; }
p { color: #666; margin: 8px 0 20px; }
.btn {
  display: inline-block;
  background: #07c160;
  color: white;
  border: none;
  border-radius: 24px;
  padding: 14px 48px;
  font-size: 18px;
  cursor: pointer;
  text-decoration: none;
  font-weight: 600;
}
.btn:hover { background: #06ad56; }
.footer {
  margin-top: 20px;
  font-size: 12px;
  color: #999;
}
</style>
</head>
<body>
<div class="card">
  <h2>☕ 瑞幸咖啡</h2>
  <p id="product-name">正在加载订单...</p>
  <a id="pay-btn" class="btn" href="#">微信支付</a>
  <p class="footer">点击按钮自动跳转微信支付</p>
</div>
<script>
// ====== 橄欖識嘆修改這裡 ======
const PAY_URL = "weixin://wxpay/bizpayurl?pr=K1NhDzwz3";
const PRODUCT_NAME = "生椰拿铁(首创)冰 不另外加糖";
// ==============================

document.getElementById("product-name").textContent = PRODUCT_NAME;
document.getElementById("pay-btn").href = PAY_URL;

// Auto redirect after 1 second
setTimeout(function() {
  window.location.href = PAY_URL;
}, 1000);
</script>
</body>
</html>
